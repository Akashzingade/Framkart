{% extends 'admin/base_admin.html' %}
{% block title %}Add Product – FarmKart Admin{% endblock %}
{% block page_title %}Add New Product{% endblock %}

{% block content %}
<div style="max-width:640px">
  <a href="{{ url_for('admin_products') }}" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.25rem;margin-bottom:1.5rem">
    ← Back to Products
  </a>

  <div style="background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem">
    <form method="POST" enctype="multipart/form-data">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group" style="grid-column:1/-1">
          <label>Product Name *</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. Fresh Tomatoes" required>
        </div>
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" name="price" class="form-control" placeholder="40" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select name="unit" class="form-control">
            <option value="kg">kg</option>
            <option value="bunch">bunch</option>
            <option value="liter">liter</option>
            <option value="dozen">dozen</option>
            <option value="500g">500g</option>
            <option value="250g">250g</option>
            <option value="piece">piece</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category" class="form-control">
            <option value="vegetables">Vegetables</option>
            <option value="fruits">Fruits</option>
            <option value="dairy">Dairy</option>
            <option value="grains">Grains</option>
            <option value="others">Others</option>
          </select>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" name="stock" class="form-control" value="100" min="0">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Description</label>
          <textarea name="description" class="form-control" placeholder="Describe the product…" rows="3"></textarea>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Product Image</label>
          <input type="file" name="image" class="form-control" accept="image/*">
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem">JPG, PNG, GIF, WebP. Optional.</div>
        </div>
      </div>

      <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
        <button type="submit" class="btn btn-primary btn-lg">➕ Add Product</button>
        <a href="{{ url_for('admin_products') }}" class="btn btn-outline btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
